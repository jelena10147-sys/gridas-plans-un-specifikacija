<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grīdas plāns un specifikācija</title>
<style>
  :root{
    /* Drafting-desk palette — quiet, so the drawings carry the colour */
    --desk-1:#3a4550;
    --desk-2:#2b333c;
    --paper:#ffffff;
    --paper-edge:#e8e6df;
    --ink:#2b333c;
    --hint:#c9cdd3;
    --coil:#c2c6cc;
    --coil-dark:#7f858d;
    --accent:#d98a3d;      /* warm drafting-orange, used only for the hint line */
    --shadow:rgba(20,26,32,.45);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(120% 120% at 50% 0%, var(--desk-1) 0%, var(--desk-2) 70%, #232a31 100%);
    color:#eef1f4;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100dvh;
    padding:clamp(10px,3vw,32px);
    overflow:hidden;
  }

  /* subtle paper-desk texture */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:22px 22px;opacity:.6;
  }

  .stage{
    width:min(1180px,100%);
    display:flex;flex-direction:column;align-items:center;gap:clamp(10px,2vh,20px);
  }

  .caption{
    text-align:center;letter-spacing:.02em;line-height:1.35;
    text-shadow:0 1px 2px rgba(0,0,0,.4);
  }
  .caption .fig{
    font-size:clamp(11px,1.5vw,13px);text-transform:uppercase;letter-spacing:.18em;
    color:#aeb6bf;margin-bottom:4px;
  }
  .caption .ttl{font-size:clamp(15px,2.4vw,20px);font-weight:600;color:#fff;}

  /* ---- The book ---- */
  .book-wrap{ width:100%; display:flex; justify-content:center; }
  .book{
    position:relative;
    width:100%;
    max-width:1080px;
    aspect-ratio:3089 / 2199;      /* matches the trimmed sheets */
    perspective:2600px;
    perspective-origin:50% 50%;
  }

  .page{
    position:absolute;inset:0;
    background:var(--paper);
    border-radius:3px 10px 10px 3px;
    box-shadow:0 18px 40px -12px var(--shadow), 0 4px 12px rgba(0,0,0,.25);
    overflow:hidden;
  }
  .page img, .leaf-face img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
    background:#fff;user-select:none;-webkit-user-drag:none;pointer-events:none;
  }

  /* spec sits underneath */
  .page-under{ z-index:1; }

  /* the turning leaf */
  .leaf{
    position:absolute;inset:0;z-index:3;
    transform-style:preserve-3d;
    transform-origin:left center;
    transition:transform 1s cubic-bezier(.2,.65,.3,1);
    transform:rotateY(0deg);
    cursor:default;
  }
  .book.flipped .leaf{ transform:rotateY(-179deg); }

  .leaf-face{
    position:absolute;inset:0;
    -webkit-backface-visibility:hidden;backface-visibility:hidden;
    background:var(--paper);
    border-radius:3px 10px 10px 3px;
    overflow:hidden;
    box-shadow:0 18px 40px -12px var(--shadow);
  }
  .leaf-front{ z-index:2; }
  .leaf-back{
    transform:rotateY(180deg);
    border-radius:10px 3px 3px 10px;
    background:linear-gradient(180deg,#fbfaf7,#f1efe9);
  }
  .leaf-back .backing{
    position:absolute;inset:0;
    background-image:
      linear-gradient(90deg,rgba(0,0,0,.05),transparent 12%),
      repeating-linear-gradient(0deg,rgba(0,0,0,.015) 0 2px,transparent 2px 26px);
  }
  .leaf-back .backing-note{
    position:absolute;left:0;right:0;top:46%;text-align:center;
    color:#b7b3a8;font-size:clamp(10px,1.6vw,14px);letter-spacing:.25em;text-transform:uppercase;
  }

  /* soft page-curvature shading that deepens mid-turn */
  .leaf-front::after{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
    background:linear-gradient(90deg,rgba(0,0,0,.14) 0%,rgba(0,0,0,0) 9%,rgba(0,0,0,0) 92%,rgba(0,0,0,.06) 100%);
    opacity:0;transition:opacity .5s;
  }
  .book.turning .leaf-front::after{opacity:1;}

  /* shadow the leaf casts on the spec page while lifting */
  .turn-shadow{
    position:absolute;inset:0;z-index:2;pointer-events:none;border-radius:3px 10px 10px 3px;
    background:linear-gradient(90deg,rgba(0,0,0,.35),rgba(0,0,0,0) 55%);
    opacity:0;transition:opacity .5s;
  }
  .book.turning .turn-shadow{opacity:.5;}

  /* ---- spiral binding from the supplied image ---- */
  .spiral-image{
    position:absolute;
    top:-1.2%;
    left:-31px;
    width:47px;
    height:102.4%;
    z-index:7;
    pointer-events:none;
    object-fit:fill;
    object-position:center;
    filter:drop-shadow(2px 2px 2px rgba(0,0,0,.28));
  }

  /* ---- peel / dog-ear corner (bottom-right) ---- */
  .peel{
    position:absolute;right:0;bottom:0;width:clamp(66px,11%,120px);aspect-ratio:1;
    z-index:4;cursor:pointer;
    /* the lifted triangle */
    background:linear-gradient(135deg,#f7f5f0 0%,#e9e6de 46%,#d8d4c9 60%,#ceccc2 100%);
    clip-path:polygon(100% 0,100% 100%,0 100%);
    border-bottom-right-radius:10px;
    box-shadow:-3px -3px 8px rgba(0,0,0,.18);
    transition:width .25s ease, filter .25s ease;
  }
  .peel::before{ /* the dark triangular gap the lift reveals */
    content:"";position:absolute;right:0;bottom:0;width:100%;height:100%;
    clip-path:polygon(100% 0,100% 100%,0 100%);
    background:linear-gradient(135deg,transparent 48%,rgba(0,0,0,.28) 62%,rgba(0,0,0,.12) 100%);
    z-index:-1;transform:translate(-4%, -4%);
  }
  .peel:hover, .peel:focus-visible{ width:clamp(84px,14%,150px);outline:none; }
  .peel .fold-line{
    position:absolute;right:0;bottom:0;width:141%;height:2px;background:var(--accent);
    opacity:.0;transform-origin:bottom right;transform:rotate(-45deg) translateY(0);
    transition:opacity .25s;
  }
  .peel:hover .fold-line{opacity:.55;}
  /* little "turn" glyph on the peel */
  .peel .glyph{
    position:absolute;right:12%;bottom:12%;width:44%;height:44%;
    opacity:.5;transition:opacity .25s;
  }
  .peel:hover .glyph{opacity:.85;}

  .book.flipped .peel{ display:none; }

  /* peel on the spec page to go back — mirrored, sits above spec, hidden until flipped */
  .peel-back{
    position:absolute;right:0;bottom:0;width:clamp(66px,11%,120px);aspect-ratio:1;
    z-index:2;cursor:pointer;display:none;
    background:linear-gradient(135deg,#f7f5f0 0%,#e9e6de 46%,#d8d4c9 60%,#ceccc2 100%);
    clip-path:polygon(100% 0,100% 100%,0 100%);
    border-bottom-right-radius:10px;
    box-shadow:-3px -3px 8px rgba(0,0,0,.18);
    transition:width .25s ease;
  }
  .peel-back::before{
    content:"";position:absolute;right:0;bottom:0;width:100%;height:100%;
    clip-path:polygon(100% 0,100% 100%,0 100%);
    background:linear-gradient(135deg,transparent 48%,rgba(0,0,0,.28) 62%,rgba(0,0,0,.12) 100%);
    z-index:-1;transform:translate(-4%,-4%);
  }
  .peel-back:hover{ width:clamp(84px,14%,150px); }
  .book.flipped .peel-back{ display:block; }

  /* ---- controls ---- */
  .controls{ display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center; }
  .btn{
    appearance:none;border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06);color:#eef1f4;
    padding:9px 16px;border-radius:999px;font-size:14px;font-weight:500;cursor:pointer;
    display:inline-flex;align-items:center;gap:8px;
    transition:background .18s,border-color .18s,transform .05s;
    backdrop-filter:blur(4px);
  }
  .btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.32);}
  .btn:active{transform:translateY(1px);}
  .btn svg{width:16px;height:16px;}
  .btn[disabled]{opacity:.4;cursor:default;}
  .tag{
    font-size:12.5px;color:#aeb6bf;letter-spacing:.06em;
    padding:6px 4px;min-width:120px;text-align:center;
  }
  .tag b{color:#fff;font-weight:600;}

  .hint-hand{
    position:absolute;left:50%;bottom:-14px;transform:translateX(-50%);z-index:10;pointer-events:none;
    font-size:12.5px;color:#fff;background:rgba(20,26,32,.82);
    padding:7px 12px;border-radius:8px;white-space:nowrap;
    box-shadow:0 4px 12px rgba(0,0,0,.35);
    animation:bob 1.8s ease-in-out infinite;
  }
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}
  .book.flipped ~ .hint-hand, .book.seen .hint-hand{display:none;}

  /* ---- zoom overlay ---- */
  .zoom{
    position:fixed;inset:0;z-index:50;background:#12161c;
    display:none;align-items:center;justify-content:center;
    touch-action:none;cursor:grab;
  }
  .zoom.open{display:flex;}
  .zoom.grabbing{cursor:grabbing;}
  .zoom img{
    position:absolute;top:0;left:0;transform-origin:0 0;
    max-width:none;user-select:none;-webkit-user-drag:none;
    box-shadow:0 20px 60px rgba(0,0,0,.6);background:#fff;border-radius:4px;
  }
  .zoom-bar{
    position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:52;
    display:flex;gap:8px;align-items:center;
  }
  .zoom-close{position:fixed;top:14px;right:14px;z-index:52;}
  .zoom-hint{
    position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:52;
    font-size:12.5px;color:#c9cdd3;background:rgba(20,26,32,.7);padding:6px 12px;border-radius:8px;
  }

  @media (max-width:640px){
    .tag{min-width:0;}
    .caption .ttl{font-size:16px;}
  }
  @media (prefers-reduced-motion:reduce){
    .leaf{transition:transform .01s;}
    .hint-hand{animation:none;}
  }

  /* Loading screen: prevents a large empty dark block while embedded images decode */
  #pageLoader{
    position:fixed;
    inset:0;
    z-index:1000;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    background:#f5f6f7;
    color:#2b333c;
    font-size:16px;
    font-weight:600;
    transition:opacity .2s ease, visibility .2s ease;
  }
  .loader-spinner{
    width:34px;
    height:34px;
    border:4px solid #d7dce1;
    border-top-color:#3a4550;
    border-radius:50%;
    animation:loaderSpin .8s linear infinite;
  }
  @keyframes loaderSpin{to{transform:rotate(360deg)}}
  body.is-loading .stage{visibility:hidden;}
  body.is-ready #pageLoader{opacity:0;visibility:hidden;pointer-events:none;}
  body.is-ready .stage{visibility:visible;}

</style>
</head>
<body class="is-loading">
  <div id="pageLoader" aria-live="polite">
    <div class="loader-spinner"></div>
    <div class="loader-text">Materiāls tiek ielādēts...</div>
  </div>
  <div class="stage">
    <div class="caption">
      <div class="ttl">Grīdas plāns un specifikācija</div>
    </div>

    <div class="book-wrap">
      <div class="book" id="book">
        <!-- spec page underneath -->
        <div class="page page-under">
          <img id="specImg" alt="Grīdas segumu specifikācija (IN-1-3)">
          <div class="peel-back" id="peelBack" title="Pāršķirt atpakaļ uz plānu" tabindex="0" aria-label="Pāršķirt atpakaļ uz plānu"></div>
        </div>

        <!-- shadow cast during turn -->
        <div class="turn-shadow"></div>

        <!-- turning leaf: front = plan, back = paper -->
        <div class="leaf" id="leaf">
          <div class="leaf-face leaf-front">
            <img id="planImg" alt="Grīdas segumu plāns (IN-1-2)">
            <!-- peel corner (bottom-right) to flip forward -->
            <div class="peel" id="peel" title="Pāršķirt uz specifikāciju" tabindex="0" aria-label="Pāršķirt uz specifikāciju">
              <div class="fold-line"></div>
              <svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="#7a5a2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 12a8 8 0 1 1 2.3 5.6"/><path d="M4 20v-4h4"/>
              </svg>
            </div>
          </div>
          <div class="leaf-face leaf-back">
            <div class="backing"></div>
            <div class="backing-note">Grīdas segumu plāns · IN-1-2</div>
          </div>
        </div>

        <div class="hint-hand" id="hint">Uzsit uz atlocītā stūra apakšā pa labi, lai pāršķirtu →</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="prevBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        Plāns
      </button>
      <span class="tag" id="stateTag"><b>Plāns</b> · IN-1-2</span>
      <button class="btn" id="nextBtn">
        Specifikācija
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <button class="btn" id="zoomBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3M11 8v6M8 11h6"/></svg>
        Tuvināt
      </button>
    </div>
  </div>

  <!-- zoom overlay -->
  <div class="zoom" id="zoom">
    <div class="zoom-bar">
      <button class="btn" id="zOut"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
      <button class="btn" id="zIn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
    </div>
    <button class="btn zoom-close" id="zClose">Aizvērt ✕</button>
    <img id="zoomImg" alt="">
    <div class="zoom-hint">Velc, lai pārvietotu · ritenītis vai +/− tuvina · dubultklikšķis atiestata</div>
  </div>

  const planImg = document.getElementById('planImg');
  const specImg = document.getElementById('specImg');
  planImg.src = PLAN_SRC;
  specImg.src = SPEC_SRC;

  const book   = document.getElementById('book');
  const leaf   = document.getElementById('leaf');
  const peel   = document.getElementById('peel');
  const peelBack = document.getElementById('peelBack');
  const hint   = document.getElementById('hint');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const stateTag = document.getElementById('stateTag');

  let flipped = false;
  let animating = false;

  function setState(){
    prevBtn.disabled = !flipped;
    nextBtn.disabled = flipped;
    stateTag.innerHTML = flipped
      ? '<b>Specifikācija</b> · IN-1-3'
      : '<b>Plāns</b> · IN-1-2';
  }

  function flipTo(target){
    if(animating || target === flipped) return;
    animating = true;
    book.classList.add('turning','seen');
    flipped = target;
    book.classList.toggle('flipped', flipped);
    setState();
    setTimeout(()=>{ book.classList.remove('turning'); animating=false; }, 1000);
  }

  peel.addEventListener('click', ()=>flipTo(true));
  peelBack.addEventListener('click', ()=>flipTo(false));
  peel.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();flipTo(true);} });
  peelBack.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();flipTo(false);} });
  nextBtn.addEventListener('click', ()=>flipTo(true));
  prevBtn.addEventListener('click', ()=>flipTo(false));

  document.addEventListener('keydown', e=>{
    if(document.getElementById('zoom').classList.contains('open')) return;
    if(e.key==='ArrowRight') flipTo(true);
    if(e.key==='ArrowLeft')  flipTo(false);
  });

  setState();

  /* ---------- zoom ---------- */
  const zoom = document.getElementById('zoom');
  const zoomImg = document.getElementById('zoomImg');
  const zoomBtn = document.getElementById('zoomBtn');
  const zClose = document.getElementById('zClose');
  const zIn = document.getElementById('zIn');
  const zOut = document.getElementById('zOut');

  let scale=1, tx=0, ty=0, baseScale=1;

  function openZoom(){
    zoomImg.src = flipped ? SPEC_SRC : PLAN_SRC;
    zoom.classList.add('open');
    zoomImg.onload = ()=>fitZoom();
    if(zoomImg.complete) fitZoom();
  }
  function fitZoom(){
    const vw = window.innerWidth, vh = window.innerHeight;
    const iw = zoomImg.naturalWidth, ih = zoomImg.naturalHeight;
    baseScale = Math.min(vw*0.94/iw, vh*0.86/ih);
    scale = baseScale;
    tx = (vw - iw*scale)/2;
    ty = (vh - ih*scale)/2;
    apply();
  }
  function apply(){
    zoomImg.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  }
  function zoomAt(cx, cy, factor){
    const ns = Math.max(baseScale*0.9, Math.min(baseScale*6, scale*factor));
    // keep the point under cursor fixed
    tx = cx - (cx - tx) * (ns/scale);
    ty = cy - (cy - ty) * (ns/scale);
    scale = ns;
    apply();
  }
  zoomBtn.addEventListener('click', openZoom);
  zClose.addEventListener('click', ()=>zoom.classList.remove('open'));
  zoom.addEventListener('click', e=>{ if(e.target===zoom) zoom.classList.remove('open'); });
  zIn.addEventListener('click', ()=>zoomAt(innerWidth/2, innerHeight/2, 1.3));
  zOut.addEventListener('click', ()=>zoomAt(innerWidth/2, innerHeight/2, 1/1.3));

  zoom.addEventListener('wheel', e=>{
    e.preventDefault();
    zoomAt(e.clientX, e.clientY, e.deltaY<0 ? 1.12 : 1/1.12);
  }, {passive:false});

  zoomImg.addEventListener('dblclick', fitZoom);

  // drag to pan
  let dragging=false, lx=0, ly=0;
  zoom.addEventListener('pointerdown', e=>{
    if(e.target===zClose||e.target.closest('.zoom-bar')) return;
    dragging=true; lx=e.clientX; ly=e.clientY; zoom.classList.add('grabbing');
    zoom.setPointerCapture(e.pointerId);
  });
  zoom.addEventListener('pointermove', e=>{
    if(!dragging) return;
    tx += e.clientX-lx; ty += e.clientY-ly; lx=e.clientX; ly=e.clientY; apply();
  });
  zoom.addEventListener('pointerup', e=>{ dragging=false; zoom.classList.remove('grabbing'); });
  zoom.addEventListener('pointercancel', ()=>{ dragging=false; zoom.classList.remove('grabbing'); });

  // pinch zoom (two pointers)
  const pts=new Map(); let pinchDist=0;
  zoom.addEventListener('pointerdown', e=>pts.set(e.pointerId,e));
  zoom.addEventListener('pointermove', e=>{
    if(!pts.has(e.pointerId)) return;
    pts.set(e.pointerId,e);
    if(pts.size===2){
      const [a,b]=[...pts.values()];
      const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
      if(pinchDist){
        const cx=(a.clientX+b.clientX)/2, cy=(a.clientY+b.clientY)/2;
        zoomAt(cx,cy, d/pinchDist);
      }
      pinchDist=d; dragging=false;
    }
  });
  function clearPt(e){ pts.delete(e.pointerId); if(pts.size<2) pinchDist=0; }
  zoom.addEventListener('pointerup',clearPt);
  zoom.addEventListener('pointercancel',clearPt);

  document.addEventListener('keydown', e=>{
    if(!zoom.classList.contains('open')) return;
    if(e.key==='Escape') zoom.classList.remove('open');
    if(e.key==='+'||e.key==='=') zoomAt(innerWidth/2,innerHeight/2,1.2);
    if(e.key==='-') zoomAt(innerWidth/2,innerHeight/2,1/1.2);
  });
  window.addEventListener('resize', ()=>{ if(zoom.classList.contains('open')) fitZoom(); });

  // spiral binding from the supplied image
  function buildBinding(){

  buildBinding();

  // Reveal the activity only after both embedded drawing images are decoded.
  (() => {
    const loader = document.getElementById('pageLoader');
    const images = [planImg, specImg];

    const waitForImage = (img) => {
      if (img.complete && img.naturalWidth > 0) {
        return typeof img.decode === 'function'
          ? img.decode().catch(() => {})
          : Promise.resolve();
      }

      return new Promise((resolve) => {
        const done = () => resolve();
        img.addEventListener('load', done, { once: true });
        img.addEventListener('error', done, { once: true });
      }).then(() => {
        return typeof img.decode === 'function'
          ? img.decode().catch(() => {})
          : undefined;
      });
    };

    Promise.all(images.map(waitForImage)).then(() => {
      document.body.classList.remove('is-loading');
      document.body.classList.add('is-ready');
      window.dispatchEvent(new Event('resize'));
      setTimeout(() => loader?.remove(), 250);
    });

    // Safety fallback in case a browser does not fire image events correctly.
    setTimeout(() => {
      document.body.classList.remove('is-loading');
      document.body.classList.add('is-ready');
    }, 8000);
  })();
